<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Market | Register</title>
    <link rel="stylesheet" href="css/registration.css">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <div class="brand">
                <a href="index.html" class="logo-link">M-MARKET <span class="logo-subtext">ELECTRONICS</span></a>
            </div>
        </div>
    </header>

    <main class="form-container">
        <form id="registration-form" class="auth-form">
            <h2>Create Account</h2>
            <p class="form-subtitle">Join M-Market Electronics today</p>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" name="fullName" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn">Sign Up</button>
            
            <p class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </p>
        </form>
    </main>
    <script src="javaScript/registration.js"></script>
</body>
</html>
