<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Market | My Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/myOrders.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <a href="index.html" class="logo-link">M-MARKET</a>
        <span class="logo-subtext">ELECTRONICS</span>
      </div>
      <a href="index.html" class="back-home">← Back to Store</a>
    </div>
  </header>

  <!-- PAGE: left dark panel + right white orders -->
  <div class="page-wrapper">

    <!-- LEFT — dark brand panel -->
    <div class="brand-panel">
      <div class="brand-panel-logo">M-MARKET</div>
      <div class="brand-panel-sub">Electronics</div>
      <h2 class="brand-panel-tagline">
        Track your <span>orders</span> in real time
      </h2>
      <p class="brand-panel-desc">
        View all your purchases, check delivery status, and manage your order history from one place.
      </p>

      <!-- Stats shown after orders load -->
      <div class="side-stats" id="sideStats" style="display:none">
        <div class="side-stat">
          <div class="side-stat-value" id="ss-total">0</div>
          <div class="side-stat-label">Total Orders</div>
        </div>
        <div class="side-stat">
          <div class="side-stat-value" id="ss-pending">0</div>
          <div class="side-stat-label">Pending</div>
        </div>
        <div class="side-stat">
          <div class="side-stat-value" id="ss-shipped">0</div>
          <div class="side-stat-label">Shipped</div>
        </div>
        <div class="side-stat">
          <div class="side-stat-value spent" id="ss-spent">$0</div>
          <div class="side-stat-label">Total Spent</div>
        </div>
      </div>

      <div class="brand-panel-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- RIGHT — white orders panel -->
    <div class="orders-panel">
      <div class="orders-inner">

        <div class="orders-header">
          <div>
            <p class="form-eyebrow">Account</p>
            <h1 class="orders-title">My Orders</h1>
            <p class="orders-subtitle">Your full purchase history</p>
          </div>
          <button class="refresh-btn" onclick="loadMyOrders()" title="Refresh">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>

        <div class="form-divider"></div>

        <!-- JS renders content here -->
        <div id="ordersContent"></div>

      </div>
    </div>

  </div>

  <script src="javaScript/myOrders.js"></script>
</body>
</html>
